<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Crop Recommendation System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="hero-text">
        <h1 class="typing-text" id="typingText"></h1>
    </div>
     <div class="container">
        <div class="auth-box">
            <div class="icon">🌾</div>
            <h1>Welcome Back</h1>
            <p class="subtitle">AI Crop Recommendation System</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="mobile" placeholder="Enter 10-digit mobile number" maxlength="10" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                
                <button type="submit" class="btn">Login</button>
            </form>
            
            <p class="link-text">
                Don't have an account? <a href="register.html">Register here</a>
            </p>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
    <script>
        const texts = [
            'Welcome to Agriculture World',
            'Grow Smarter with AI',
            'Empowering Farmers',
            'Smart Crop Recommendations',
            'Harvest Success Together'
        ];
        let textIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        
        function typeText() {
            const current = texts[textIndex];
            const typingElement = document.getElementById('typingText');
            
            if (isDeleting) {
                typingElement.textContent = current.substring(0, charIndex - 1);
                charIndex--;
            } else {
                typingElement.textContent = current.substring(0, charIndex + 1);
                charIndex++;
            }
            
            let typeSpeed = isDeleting ? 50 : 100;
            
            if (!isDeleting && charIndex === current.length) {
                typeSpeed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                textIndex = (textIndex + 1) % texts.length;
                typeSpeed = 500;
            }
            
            setTimeout(typeText, typeSpeed);
        }
        
        typeText();
    </script>
</body>
</html>
