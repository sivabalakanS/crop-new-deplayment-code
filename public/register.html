<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Crop Recommendation System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <div class="icon">🌾</div>
            <h1>Create Account</h1>
            <p class="subtitle">AI Crop Recommendation System</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter your name" required>
                </div>
                
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="mobile" placeholder="Enter 10-digit mobile number" maxlength="10" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Minimum 6 characters" required>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                </div>
                
                <button type="submit" class="btn">Register</button>
            </form>
            
            <p class="link-text">
                Already have an account? <a href="login.html">Login here</a>
            </p>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
